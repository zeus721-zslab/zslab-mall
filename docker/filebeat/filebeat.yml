# ============================================================
# Filebeat — zslab-mall prod 로그 수집 (Track 32 Phase 2)
# prod 컨테이너 /app/logs 의 logback JSON 로그를 tailing → zslab_elasticsearch 전송
#
# 권한 주의: 이 파일은 컨테이너에 read-only(:ro) 로 마운트됨.
#   Filebeat 는 설정 파일 소유권/권한을 검사(root 소유·비 world-writable 요구)하나,
#   호스트 bind-mount 파일은 이 조건을 못 맞출 수 있어 compose command 의
#   -strict.perms=false 로 검사를 비활성화함 (docker-compose.mall.yml 참조).
# ============================================================

filebeat.inputs:
  - type: filestream
    id: zslab-mall-log
    paths:
      - /app/logs/zslab-mall*.json
    parsers:
      # logback LogstashEncoder 가 출력한 각 JSON 라인을 파싱해 필드를 최상위로 승격
      # (traceId·correlationId·eventName 등). target:"" = 루트 승격.
      - ndjson:
          target: ""
          overwrite_keys: true
          add_error_key: true

output.elasticsearch:
  hosts: ["${ES_HOST}:${ES_PORT}"]
  # Phase 2 는 플레인 일자 인덱스로 전송. Phase 3 에서 data stream + ILM 로 전환하므로
  # 이 index 설정은 Phase 3 에서 재조정됨.
  index: "zslab-mall-logs-%{+yyyy.MM.dd}"

# Filebeat 자동 template·ILM 설치 비활성 (Phase 3 에서 우리가 명시 등록).
# setup.ilm.enabled:false 여야 위 커스텀 index 이름이 적용됨
# (Filebeat 기본 ILM 이 index 를 오버라이드하는 것 방지).
setup.template.enabled: false
setup.ilm.enabled: false
