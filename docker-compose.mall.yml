services:
  zslab_mall_backend:
    build:
      context: ./backend
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    container_name: zslab_mall_backend
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_HOST: zslab_mariadb
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      LOG_PATH: ${LOG_PATH:-/app/logs}
    volumes:
      - mall_backend_logs:/app/logs
    networks:
      zslab_zslab_net: {}
      gateway_net:
        aliases:
          - mall-backend

  zslab_mall_frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
    container_name: zslab_mall_frontend
    restart: unless-stopped
    healthcheck:
      # node:24-slim엔 curl 부재 → node 내장 fetch로 SSR 홈 응답 확인
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-}
      NUXT_API_INTERNAL_BASE: ${NUXT_API_INTERNAL_BASE:-http://mall-backend:8080}
      NUXT_PUBLIC_DEMO_EMAIL: ${NUXT_PUBLIC_DEMO_EMAIL:-}
      NUXT_PUBLIC_DEMO_PASSWORD: ${NUXT_PUBLIC_DEMO_PASSWORD:-}
    networks:
      # gateway 경유(backend와 동일)·ports 미노출. 서비스명 zslab_mall_frontend으로 gateway가 참조 → alias 미부여
      - gateway_net

  # Track 32 Phase 2 — prod 로그 수집 (named volume mall_backend_logs 공유 → zslab_elasticsearch 전송)
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: zslab_mall_filebeat
    restart: unless-stopped
    user: root   # 로그 파일 read + filebeat.yml read 위해
    command: ["filebeat", "-e", "-strict.perms=false"]
    environment:
      ES_HOST: ${ES_HOST:-zslab_elasticsearch}
      ES_PORT: ${ES_PORT:-9200}
    volumes:
      - ./docker/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - mall_backend_logs:/app/logs:ro
    networks:
      - zslab_zslab_net
    depends_on:
      - zslab_mall_backend

volumes:
  mall_backend_logs:

networks:
  zslab_zslab_net:
    external: true
  gateway_net:
    external: true
