spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# 데모 카탈로그 시드(FE-04·CatalogDemoSeedRunner)는 dev(local)에서만 활성한다.
# 테스트는 build.gradle.kts가 systemProperty false로 상위 override. 운영(prod)은 application-prod.yml에서 명시 활성(D-157 §8-1 포폴 데모 정책)이며, 시더 멱등(productRepository.count()==0)이라 실 DB 오염 없음.
catalog:
  demo-seed:
    enabled: true
