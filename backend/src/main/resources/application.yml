spring:
  application:
    name: zslab-mall
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    # DB_HOST·DB_PORT는 docker-compose.mall.yml에서 zslab_mariadb·3306으로 박제 주입 (로컬·운영 동일)
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          # KST 통일(JVM·jdbc 동시 정렬·Track 69) — URL serverTimezone 미혼용
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jackson:
    # D-49·§15: 응답 null 필드 제외(camelCase는 Jackson 기본). 날짜 UTC Z 포맷은 DTO 필드 @JsonFormat에서 처리.
    default-property-inclusion: non_null
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.zslab.mall: DEBUG
  pattern:
    # §14·D-48: 모든 로그 라인에 요청 traceId 포함(TraceIdFilter가 MDC 주입·요청 외엔 공백)
    level: "%5p [%X{traceId:-}]"

jwt:
  # 로컬 개발용 더미 시크릿 — 운영은 JWT_SECRET env 주입 필수(application-prod.yml에서 기본값 제거). HS256 최소 32바이트.
  secret: ${JWT_SECRET:local-dev-dummy-secret-please-override-min-32-bytes-long}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

admin:
  bootstrap:
    # 최초 SUPER_ADMIN 공급 자격(SuperAdminBootstrapRunner·Track 38). SUPER_ADMIN 부재 시에만 소비된다 — 빈 기본값으로
    # context는 로드되고, 생성 경로에서 blank면 기동 실패(Fail Fast). 이미 SUPER_ADMIN 존재 시 미참조(skip)라 jwt.secret과
    # 달리 prod에서도 기본값을 제거하지 않는다(제거 시 admin 존재 환경의 재기동까지 env를 강제하게 됨).
    email: ${ADMIN_BOOTSTRAP_EMAIL:}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:}
