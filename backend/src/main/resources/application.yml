spring:
  application:
    name: zslab-mall
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    # DB_HOST·DB_PORT는 docker-compose.mall.yml에서 zslab_mariadb·3306으로 박제 주입 (로컬·운영 동일)
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          # 타임존은 앱 레이어(Hibernate)에서 UTC 정규화 — URL serverTimezone 미혼용 (UTC 정책 유지)
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.zslab.mall: DEBUG
