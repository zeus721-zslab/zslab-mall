spring:
  jpa:
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        # Q5 α′: 운영 노출 = health·info·prometheus 한정. gateway IP 화이트리스트는 인프라 레이어 책임.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: WARN
    com.zslab.mall: INFO

jwt:
  # 운영: 시크릿 하드코딩·기본값 금지 — JWT_SECRET env 미주입 시 기동 실패(의도적 fail-fast). base yml 더미 override. HS256 최소 32바이트.
  secret: ${JWT_SECRET}
