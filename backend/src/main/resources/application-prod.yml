spring:
  jpa:
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        # Q5 α′: 운영 노출 = health·info·prometheus 한정. gateway IP 화이트리스트는 인프라 레이어 책임.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: WARN
    com.zslab.mall: INFO

jwt:
  # 운영: 시크릿 하드코딩·기본값 금지 — JWT_SECRET env 미주입 시 기동 실패(의도적 fail-fast). base yml 더미 override. HS256 최소 32바이트.
  secret: ${JWT_SECRET}

# 데모 카탈로그 시드(FE-04·CatalogDemoSeedRunner) 운영 활성 — 포폴 데모 상품 노출용(D-157 §8-1 정책).
# 멱등(productRepository.count()==0)이라 재기동 안전·최초 1회만 데모 공급. 실카탈로그 운영 아님.
catalog:
  demo-seed:
    enabled: true
