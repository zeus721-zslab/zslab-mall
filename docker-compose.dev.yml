# 로컬 개발 오버라이드 — Dockerfile.dev(bootRun) + 소스·gradle 캐시 마운트.
# 사용: docker compose -f docker-compose.mall.yml -f docker-compose.dev.yml up
# 운영(서버)은 docker-compose.mall.yml 단독 사용(이 오버라이드 미적용).
services:
  zslab_mall_backend:
    build:
      dockerfile: Dockerfile.dev
    environment:
      # KST 통일(JVM TZ) — application.yml hibernate.jdbc.time_zone과 동시 정렬(Track 69)
      TZ: Asia/Seoul
    volumes:
      - ./backend:/app
      - mall_gradle_cache:/home/gradle/.gradle

  zslab_mall_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: zslab_mall_frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-}
      API_INTERNAL_BASE: ${API_INTERNAL_BASE:-http://mall-backend:8080}
      NUXT_PUBLIC_DEMO_EMAIL: ${NUXT_PUBLIC_DEMO_EMAIL:-}
      NUXT_PUBLIC_DEMO_PASSWORD: ${NUXT_PUBLIC_DEMO_PASSWORD:-}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - gateway_net

volumes:
  mall_gradle_cache:
