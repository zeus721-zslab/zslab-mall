name: frontend-ci

on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # action-setup은 Install(pnpm 실행)보다 먼저 와야 한다(pnpm 실행파일 선존재 필요).
      # 버전은 frontend/package.json의 packageManager 핀에서 자동 인식(루트 package.json 없음 → 경로 명시).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # pnpm store를 러너 쓰기 가능 경로(github.workspace 하위)에 직접 캐싱. setup-node cache:pnpm은
      # 내부 pnpm store path가 pnpm-workspace.yaml storeDir(/app·컨테이너 전용)를 참조해 EACCES라 제거.
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # --config.store-dir(CLI·최고 우선순위)로 workspace storeDir(/app) 오버라이드. env·npmrc는 storeDir에 밀림(실측).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.store-dir="${{ github.workspace }}/.pnpm-store"

      # typecheck 스크립트가 'nuxt prepare && vue-tsc -b'라 prepare(.nuxt 타입 생성) 선행 포함.
      - name: Typecheck
        run: pnpm typecheck

      # vitest run — e2e/**는 vitest.config.ts exclude로 미수집(playwright 전용).
      - name: Unit tests (vitest)
        run: pnpm test
